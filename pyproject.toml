[build-system]
requires = ["setuptools", "twine", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "inventree-shipment-data"
description = "Adds Weight and Volume to SO and exposes the data to reports"
dynamic = ["version"]
authors = [
    { name = "gunstr",email = "41468206+gunstr@users.noreply.github.com" },
]
readme = "README.md"
license = "MIT"
keywords = ["inventree", "plugin"]
requires-python = ">=3.9"
dependencies = [
    # Enter your plugin library dependencies here
]
classifiers = [
    "Programming Language :: Python :: 3",
    "Operating System :: OS Independent",
    "Framework :: InvenTree",
]
[project.urls]
Homepage = "https://my-project-url.com"

[project.entry-points."inventree_plugins"]
InvenTreeShipmentData = "inventree_shipment_data.core:InvenTreeShipmentData"

[tool.setuptools.packages.find]
where = [""]

[tool.setuptools.dynamic]
version = {attr = "inventree_shipment_data.PLUGIN_VERSION"} 

[tool.ruff]
exclude = [
    ".git",
    "__pycache__",
    "test.py",
    "tests",
    "venv",
    "env",
    ".venv",
    ".env",
]

src=["inventree_shipment_data"]
